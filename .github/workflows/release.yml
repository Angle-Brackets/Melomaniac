name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_id:
        description: 'Release ID to attach assets to (required for workflow_dispatch)'
        required: false
        type: string

jobs:
  release:
    name: Release (${{ matrix.os }})
    permissions:
      contents: write
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            tauri-args: ''
          - os: macos-latest
            tauri-args: '--target universal-apple-darwin'
          - os: windows-latest
            tauri-args: ''

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libasound2-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf

      - name: Download yt-dlp sidecar (Linux)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          mkdir -p src-tauri/binaries
          curl -fsSL https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp \
            -o src-tauri/binaries/melomaniac-ytdlp-x86_64-unknown-linux-gnu
          chmod +x src-tauri/binaries/melomaniac-ytdlp-x86_64-unknown-linux-gnu

      - name: Download yt-dlp sidecar (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p src-tauri/binaries
          curl -fsSL https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos \
            -o src-tauri/binaries/melomaniac-ytdlp-universal-apple-darwin
          cp src-tauri/binaries/melomaniac-ytdlp-universal-apple-darwin src-tauri/binaries/melomaniac-ytdlp-aarch64-apple-darwin
          cp src-tauri/binaries/melomaniac-ytdlp-universal-apple-darwin src-tauri/binaries/melomaniac-ytdlp-x86_64-apple-darwin
          chmod +x src-tauri/binaries/melomaniac-ytdlp-universal-apple-darwin \
            src-tauri/binaries/melomaniac-ytdlp-aarch64-apple-darwin \
            src-tauri/binaries/melomaniac-ytdlp-x86_64-apple-darwin

      - name: Download yt-dlp sidecar (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          curl -fsSL https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe \
            -o src-tauri/binaries/melomaniac-ytdlp-x86_64-pc-windows-msvc.exe

      - name: Build and upload to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ github.event.release.id || inputs.release_id }}
          args: ${{ matrix.tauri-args }}
