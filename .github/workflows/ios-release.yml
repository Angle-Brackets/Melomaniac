name: TestFlight

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  testflight:
    name: Build and upload to TestFlight
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,x86_64-apple-ios

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Import distribution certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/xcodebuild
          security list-keychains -d user -s build.keychain $(security list-keychains -d user | tr -d '"')
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
          CERT_OWNER=$(security find-identity -v -p codesigning build.keychain 2>/dev/null | \
            sed -n 's/.*"Apple Distribution: \([^(]*\)(.*/\1/p' | head -1 | xargs)
          [ -n "$CERT_OWNER" ] && echo "::add-mask::$CERT_OWNER"

      - name: Install provisioning profile
        env:
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$APPLE_PROVISIONING_PROFILE" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/Melomaniac_AppStore.mobileprovision

      - name: Install App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APP_STORE_CONNECT_API_KEY_CONTENT" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8

      - name: Build frontend
        run: npm run build
        env:
          VITE_PLATFORM: ios

      - name: Initialize Xcode project
        run: npx tauri ios init
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Set build number
        run: |
          find src-tauri/gen/apple -name "Info.plist" -exec \
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.run_number }}" {} \; 2>/dev/null || true

      - name: Inject signing overrides via xcodebuild wrapper
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          PROFILE_UUID=$(security cms -D \
            -i ~/Library/MobileDevice/Provisioning\ Profiles/Melomaniac_AppStore.mobileprovision | \
            python3 -c "
          import sys, re
          m = re.search(r'<key>UUID</key>\s*<string>([^<]+)</string>', sys.stdin.read())
          print(m.group(1).strip()) if m else sys.exit(1)")

          cat > /tmp/ExportOptions.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>teamID</key>
              <string>$APPLE_TEAM_ID</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>signingCertificate</key>
              <string>Apple Distribution</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.melomaniac.app</key>
                  <string>$PROFILE_UUID</string>
              </dict>
          </dict>
          </plist>
          PLIST

          mkdir -p /tmp/ci-bin
          cat > /tmp/ci-bin/xcodebuild << WRAPPER
          #!/bin/bash
          for arg in "\$@"; do
            if [ "\$arg" = "-exportArchive" ]; then
              new_args=()
              skip_next=false
              for a in "\$@"; do
                if \$skip_next; then skip_next=false; continue; fi
                if [ "\$a" = "-exportOptionsPlist" ]; then skip_next=true; continue; fi
                new_args+=("\$a")
              done
              exec /usr/bin/xcodebuild "\${new_args[@]}" -exportOptionsPlist /tmp/ExportOptions.plist
            fi
          done
          exec /usr/bin/xcodebuild "\$@" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            DEVELOPMENT_TEAM=$APPLE_TEAM_ID
          WRAPPER
          chmod +x /tmp/ci-bin/xcodebuild
          echo "/tmp/ci-bin" >> "$GITHUB_PATH"

      - name: Build iOS IPA
        run: npx tauri ios build --export-method app-store-connect
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
        run: |
          IPA=$(find src-tauri/gen/apple/build -name "*.ipa" | head -1)
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_KEY_ISSUER_ID"
